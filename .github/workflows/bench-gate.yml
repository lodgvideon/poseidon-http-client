name: bench-gate
on: [pull_request]
jobs:
  bench:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - name: Bench HEAD
        run: go test -bench=. -benchmem -benchtime=2s -count=5 -run=^$ ./... | tee head.txt
      - name: Bench base
        run: |
          git checkout ${{ github.base_ref }}
          go test -bench=. -benchmem -benchtime=2s -count=5 -run=^$ ./... | tee base.txt
          git checkout -
      - name: benchstat (informational)
        run: |
          go install golang.org/x/perf/cmd/benchstat@latest
          benchstat -alpha 0.05 base.txt head.txt | tee diff.txt
      - name: Absolute zero-alloc gate
        run: ./scripts/bench-gate.sh head.txt
