name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Install golangci-lint v2.5.0
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b /usr/local/bin v2.5.0
      - run: go vet ./...
      - run: golangci-lint run ./...

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - run: go test -race -count=1 ./...
      # Keep the opt-in debug build (-tags poseidondebug) compilable so the
      # leak detector can't bitrot. Compile + vet only — its finalizer/GC tests
      # have non-deterministic timing, so they run via `make test-debug`.
      - name: Compile-check debug build tag
        run: go build -tags poseidondebug ./... && go vet -tags poseidondebug ./...

  fuzz-corpus-replay:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go test -run=Fuzz -count=1 ./...

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run tests with coverage profile
        run: go test -race -count=1 -coverprofile=cover.out ./...
      - name: Per-package + total coverage gate (floor = 80)
        run: ./scripts/coverage-gate.sh 80
