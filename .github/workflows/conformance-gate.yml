name: conformance-gate
on: [pull_request]
jobs:
  rfc:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24' }
      - run: go test -run=Conformance -count=1 -v ./... | tee rfc.txt
      - run: ./scripts/rfc-coverage-gate.sh rfc.txt
