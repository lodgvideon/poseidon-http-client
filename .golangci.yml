run:
  timeout: 5m
  go: '1.24'

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - staticcheck
    - revive
    - gosec
    - unconvert
    - misspell
    - gocyclo
    - gosimple
    - unused
    - prealloc
    - ineffassign
    - typecheck

linters-settings:
  gocyclo:
    min-complexity: 15
  govet:
    enable-all: true
    disable:
      - fieldalignment
      - shadow
  revive:
    rules:
      - name: unused-parameter
        disabled: true
      - name: exported
        arguments:
          - disableStutteringCheck

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
