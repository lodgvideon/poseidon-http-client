version: "2"

run:
  go: "1.24"

linters:
  default: none
  enable:
    - errcheck
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - prealloc
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    gocyclo:
      min-complexity: 25
    gosec:
      excludes:
        # G115: integer overflow conversions (int<->uintXX) are pervasive
        # in binary-protocol codec paths and bounded by test coverage.
        - G115
        # G402: TLS MinVersion/InsecureSkipVerify. Tests exercise both
        # default and explicit-version flows; production callers of
        # TLSDialer supply their own *tls.Config.
        - G402
    govet:
      disable:
        - fieldalignment
        - shadow
      enable-all: true
    revive:
      rules:
        - name: unused-parameter
          disabled: true
        - name: exported
          arguments:
            - disableStutteringCheck
            - disableChecksOnConstants
  exclusions:
    generated: lax
    rules:
      # errcheck: tolerate ignored errors in test files where behavior is
      # asserted via other means.
      - linters:
          - errcheck
        path: _test\.go
      # revive redefines-builtin-id: intentional shadowing of builtins
      # in a few narrow helper contexts (pool min param, cap constant).
      - linters:
          - revive
        text: redefines-builtin-id
      # revive package-comments: generated/hand-derived file.
      - linters:
          - revive
        text: package-comments
        path: huffman_table\.go

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
