# nghttpx frontend config — poseidon integration test
# Listens on :8443 (h2 over TLS) and :8080 (h2c prior-knowledge)

frontend=0.0.0.0,8443
frontend=0.0.0.0,8080;no-tls

backend=127.0.0.1,8081

# Backend is also us — nghttpx in "file" mode
add-x-forwarded-for
no-ocsp

# h2 settings
http2-max-concurrent-streams=128

# Logging
log-level=INFO

# API endpoint for healthcheck
api-max-request-body=32K
