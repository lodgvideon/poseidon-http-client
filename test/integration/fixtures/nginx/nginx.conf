# nginx.conf — poseidon integration test server
# h2 (TLS+ALPN) on :8443, plain HTTP/1.1 healthcheck on :8080

worker_processes 1;
events { worker_connections 256; }

http {
    access_log off;
    error_log  /dev/stderr warn;

    server {
        listen 8080;
        server_name _;

        location = /healthz {
            return 200 "ok";
            add_header Content-Type text/plain;
        }
    }

    server {
        listen 8443 ssl;
        http2 on;
        server_name localhost;

        ssl_certificate     /etc/nginx/certs/server.pem;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        keepalive_timeout 60s;
        http2_max_concurrent_streams 128;

        location = /healthz {
            return 200 "ok";
        }

        location = / {
            return 200 "hello from nginx";
            add_header Content-Type text/plain;
        }

        location = /echo {
            echo_duplicate 1 $request_body;
        }

        location ~ ^/status/(\d+)$ {
            return $1 "status $1";
        }

        location /large {
            content_by_lua_block {
                local n = tonumber(ngx.var.arg_bytes) or 1048576
                ngx.header["Content-Type"] = "application/octet-stream"
                ngx.header["Content-Length"] = tostring(n)
                local chunk = string.rep("x", 4096)
                local sent = 0
                while sent < n do
                    local remaining = n - sent
                    local sz = remaining < 4096 and remaining or 4096
                    ngx.print(string.sub(chunk, 1, sz))
                    sent = sent + sz
                    ngx.flush(true)
                end
            }
        }

        location /delay {
            content_by_lua_block {
                local ms = tonumber(ngx.var.arg_ms) or 1000
                ngx.sleep(ms / 1000)
                ngx.say("delayed " .. ms .. "ms")
            }
        }

        location = /gzip {
            gzip on;
            gzip_types text/plain;
            gzip_proxied any;
            default_type text/plain;
            gzip_max_length 0;
            echo_duplicate 10240 "x";
        }

        location = /chunked {
            content_by_lua_block {
                ngx.header["Content-Type"] = "text/plain"
                for i = 1, 100 do
                    ngx.print(string.rep("c", 1024))
                    ngx.flush(true)
                    ngx.sleep(0.01)
                end
            }
        }

        location = /trailers {
            add_header Trailer "X-Trailer-Foo";
            add_header X-Trailer-Foo "bar" always;
            return 200 "trailers";
        }

        location = /never {
            content_by_lua_block { ngx.sleep(300) }
        }
    }
}
