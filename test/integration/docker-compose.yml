name: poseidon-it

networks:
  h2net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

services:
  # ── nginx — production C-impl, h2 over TLS ──────────────────────
  nginx:
    image: openresty/openresty:1.27.1.1-alpine-fat
    container_name: poseidon-it-nginx
    hostname: nginx
    networks:
      h2net:
        ipv4_address: 172.30.0.10
    ports:
      - "127.0.0.1:18080:8443"
    volumes:
      - ./fixtures/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./fixtures/certs:/etc/nginx/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 3s
    restart: "no"

  # ── Undertow — JVM h2 server, h2 + h2c ──────────────────────────
  undertow:
    build:
      context: .
      dockerfile: Dockerfile.undertow
    image: poseidon-it/undertow:local
    container_name: poseidon-it-undertow
    hostname: undertow
    networks:
      h2net:
        ipv4_address: 172.30.0.11
    ports:
      - "127.0.0.1:18081:8443"
      - "127.0.0.1:18082:8080"
    volumes:
      - ./fixtures/certs:/app/certs:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8080/healthz"]
      interval: 1s
      timeout: 2s
      retries: 60
      start_period: 15s
    environment:
      - JAVA_OPTS=-XX:+UseG1GC -Xmx512m
    restart: "no"
